monitor=,preferred,auto,1

exec-once = waybar
exec-once = dunst
exec-once = swww init
exec-once = sleep 1 && swww img ~/.config/hypr/wallpaper.png

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Цвет активного окна (черный)
    col.active_border = rgba(000000ff) 
    
    # Цвет неактивного окна (тоже черный или темно-серый)
    col.inactive_border = rgba(000000ff)

    layout = dwindle
}

decoration {
    rounding = 12
}

animations {
    enabled = yes
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

$mainMod = SUPER

# основные бинды
bind = $mainMod, Q, exec, kitty
bind = $mainMod, T, exec, kitty
bind = $mainMod, C, killactive
bind = $mainMod, M, exit
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, R, exec, rofi -show drun

# спец воркспейс
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# управление окнами
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# фокус стрелками
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# воркспейсы
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# мышка (перетаскивание)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# скриншоты
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast save area
bind = CTRL, Print, exec, grimblast copy screen

# Громкость: F2 (тише) и F3 (громче)
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%

# На всякий случай дублируем для обычных F2/F3, если мультимедийные не подхватят
binde = , F2, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
binde = , F3, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%

# Мут на F1 (по желанию)
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# правила слоёв
decoration {
    rounding = 12

    blur {
        enabled = yes
        size = 3
        passes = 1
    }
}

exec-once = swww-daemon
exec-once = sleep 2 && swww img ~/Загрузки/linuxwall.jpg

# Правильные правила для kitty
windowrule = opacity 0.85 override 0.75 override, kitty
windowrule = blur, kitty


